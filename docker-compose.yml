# ─── 律答 AI Docker Compose ──────────────────────────────
# 启动: docker compose up -d
# 停止: docker compose down
# 查看日志: docker compose logs -f

services:
  backend:
    build: .
    container_name: lvda-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HF_HUB_OFFLINE=1
    volumes:
      # 持久化数据：重启不丢失
      - chroma_data:/app/chroma_db
      - upload_data:/app/uploads
      - conv_data:/app/conversations
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: lvda-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
  upload_data:
  conv_data:
